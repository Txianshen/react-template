<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59, 130, 246, 0.1)" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(59, 130, 246, 0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(59, 130, 246, 0);stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="50%" cy="50%" r="30%" fill="url(#fade)" />
</svg>